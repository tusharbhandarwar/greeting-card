<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rajnandini</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    z-index:10;
    padding:20px;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(255,255,255,0.8);
}

button{
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:white;
    color:#ff4f81;
    font-weight:bold;
}

#message{
    margin-top:30px;
    font-size:1.4rem;
    line-height:1.8;
    display:none;
    max-width:700px;
}

.balloon{
    position:absolute;
    font-size:40px;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(120vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:fall 4s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Rajnandini 🎂</h1>

    <button onclick="startSurprise()">
        Open Your Birthday Surprise 🎁
    </button>

    <div id="message"></div>
</div>

<script>

for(let i=0;i<20;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.innerHTML="🎈";
    b.style.left=Math.random()*100+"vw";
    b.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(b);
}

const text = `
Wishing you a very Happy Birthday, Rajnandini!

May your day be filled with happiness, laughter,
wonderful memories and lots of cake. 🎂

Thank you for being such a supportive colleague,
a great friend, and a wonderful person.

May success, good health, and endless happiness
follow you throughout the year.

Enjoy your special day!

🌸 Best Wishes 🌸
`;

function startSurprise(){

    let msg=document.getElementById("message");
    msg.style.display="block";

    let i=0;
    msg.innerHTML="";

    let typing=setInterval(()=>{
        msg.innerHTML += text.charAt(i);
        i++;

        if(i>=text.length){
            clearInterval(typing);
        }
    },40);

    createConfetti();
}

function createConfetti(){

    for(let i=0;i<150;i++){

        let c=document.createElement("div");

        c.className="confetti";

        c.style.left=Math.random()*100+"vw";

        c.style.background=
        `hsl(${Math.random()*360},100%,50%)`;

        c.style.animationDuration=
        (2+Math.random()*3)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

</script>

</body>
</html>
